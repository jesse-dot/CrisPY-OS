name: Build and Release CrisPY OS Variants
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create releases
    container:
      image: alpine:latest
      options: --privileged

    steps:
      - name: Install Build Dependencies
        run: |
          apk add --no-cache \
            alpine-sdk \
            syslinux \
            xorriso \
            mtools \
            dosfstools \
            grub-efi \
            python3 \
            cpio \
            gzip

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate ISOs
        run: |
          chmod +x ./build_iso_helper.sh
          ./build_iso_helper.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crispy-os-variants
          path: "*.iso"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crispy-live.iso
            crispy-installer.iso
          tag_name: v0.1.${{ github.run_number }}
          name: CrisPY OS Build v0.1.${{ github.run_number }}
          body: |
            Automated build of CrisPY OS variants.
            
            **Included Variants:**
            - **Live Version**: Standard shell environment (`main.py`).
            - **Installer Version**: Includes `fdisk`, `e2fsprogs`, and `grub` for disk installation (`main_installable.py`).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
