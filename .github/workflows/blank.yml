name: Build and Release CrisPY OS
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create releases
    container:
      image: alpine:latest
      options: --privileged

    steps:
      - name: Install Build Dependencies
        run: |
          apk add --no-cache \
            alpine-sdk \
            syslinux \
            xorriso \
            mtools \
            dosfstools \
            grub-efi \
            python3 \
            cpio \
            gzip

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate ISO
        run: |
          chmod +x ./build_iso_helper.sh
          ./build_iso_helper.sh

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crispy-os-iso
          path: pyos.iso

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: pyos.iso
          tag_name: v0.1.${{ github.run_number }}
          name: CrisPY OS Build v0.1.${{ github.run_number }}
          body: |
            Automated build of CrisPY OS.
            
            Changes in this version:
            - Latest kernel and Python rootfs structure.
            - Bootable ISO compatible with BIOS.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
